<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DELHI TO DEHRADUN EXPRESSWAY</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <button class="mode" onclick="toggleMode()">🌙 Dark Mode</button>

    <!-- Hero Section -->

    <div class="hero">
      <img src="image.png" alt="Expressway Highway" />


      <div class="hero-text">
        <h1>DELHI - DEHRADUN EXPRESSWAY</h1>

 <b></b>
        <p>PREMIUM AND FASTEST WAY TO FIND YOUR ROUTE</p>
      </div>
    </div>

    <div class="container">
      <!-- Search Card -->

      <div class="card">
        <h2>🔍FIND THE BEST ROUTE</h2>

        <div class="input-box">
          <label> 📍 Source City </label>

          <select id="source">
            <option value="">Select Source</option>
          </select>
        </div>


        <div class="input-box">
          <label> 🏁 Destination City </label>

          <select id="destination">
            <option value="">Select Destination</option>
          </select>
        </div>

        <button onclick="findRoute()">Find Route 🚗</button>
      </div>

      <!-- Result -->

      <div id="output"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
